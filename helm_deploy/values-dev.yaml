---
# Per environment values which override defaults in srrc-capture-finger-prints/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: srrc-dev.hmpps.service.justice.gov.uk
    tlsSecretName: srrc-dev-cert

  env:
    INGRESS_URL: "https://srrc-dev.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-dev.prison.service.justice.gov.uk"
    EXAMPLE_API_URL: 'https://srrc-api-dev.hmpps.service.justice.gov.uk'
    ENVIRONMENT_NAME: DEV
    AUDIT_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: NON_PROD_ALERTS_SEVERITY_LABEL
