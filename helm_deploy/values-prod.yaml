---
# Per environment values which override defaults in srrc-capture-finger-prints/values.yaml

generic-service:
  ingress:
    host: srrc.hmpps.service.justice.gov.uk

  env:
    INGRESS_URL: "https://srrc.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api.prison.service.justice.gov.uk"
    EXAMPLE_API_URL: 'https://srrc-api.hmpps.service.justice.gov.uk'
    AUDIT_ENABLED: "false"

generic-prometheus-alerts:
  alertSeverity: PROD_ALERTS_SEVERITY_LABEL
